<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate Memo Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Corporate Memo Management System</h1>
            <nav>
                <a href="/memos" class="nav-link">All Memos</a>
                <a href="/memos/new" class="nav-link btn-primary">Create New Memo</a>
            </nav>
        </header>

        <main>
            <section class="memo-list">
                <h2>Memos</h2>
                <div th:if="${memos.isEmpty()}" class="empty-state">
                    <p>No memos found. <a href="/memos/new">Create your first memo</a></p>
                </div>
                <div th:if="${!memos.isEmpty()}" class="memo-cards">
                    <div th:each="memo : ${memos}" class="memo-card">
                        <div class="memo-card-header">
                            <h3 th:text="${memo.title}"></h3>
                            <small th:text="${#temporals.format(memo.createdAt, 'MMM dd, yyyy HH:mm')}"></small>
                        </div>
                        <div class="memo-card-details">
                            <p><strong>From:</strong> <span th:text="${memo.fromSender}"></span></p>
                            <p><strong>To:</strong> <span th:text="${memo.toRecipients}"></span></p>
                            <p th:if="${memo.ccRecipients}" class="cc-info"><strong>CC:</strong> <span th:text="${memo.ccRecipients}"></span></p>
                        </div>
                        <div class="memo-card-body">
                            <p class="memo-preview" th:text="${#strings.abbreviate(memo.body, 100)}"></p>
                        </div>
                        <div class="memo-card-actions">
                            <a th:href="@{/memos/{id}(id=${memo.id})}" class="btn btn-info">View</a>
                            <a th:href="@{/memos/download/{id}(id=${memo.id})}" class="btn btn-success">Download</a>
                            <a th:href="@{/memos/edit/{id}(id=${memo.id})}" class="btn btn-warning">Edit</a>
                            <a th:href="@{/memos/delete/{id}(id=${memo.id})}" class="btn btn-danger" onclick="return confirm('Are you sure?')">Delete</a>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2024 Corporate Memo Management System. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
