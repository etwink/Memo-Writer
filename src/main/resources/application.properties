# MongoDB Configuration
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/memo_database}
spring.data.mongodb.auto-index-creation=${SPRING_DATA_MONGODB_AUTO_INDEX_CREATION:true}

# Application Configuration
spring.application.name=${SPRING_APPLICATION_NAME:memo-project}

# Server Configuration
server.port=${SERVER_PORT:8080}

# Logging Configuration
logging.level.com.memoapp=${LOGGING_LEVEL_COM_MEMOAPP:INFO}
logging.level.org.springframework.web=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB:INFO}
logging.level.org.springframework.data=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_DATA:INFO}
